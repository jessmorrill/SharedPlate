{% extends "base.html" %}

{% block content %}

<h2>Forgot Password</h2>

{% if error %}
<p style="color: red;">{{ error }}</p>
<p><a href="{{ url_for('register') }}" style="color: blue;">Sign up</a></p>
{% endif %}

<form method="POST">
    <p>Email:<br>
    <input type="email" name="email" required></p>

    <button type="submit">Send Reset Code</button>
</form>

{% endblock %}
