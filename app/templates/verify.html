{% extends "base.html" %}
{% block title %}Verify Email — SharedPlate{% endblock %}
{% block content %}

<h1>Verify your email</h1>
<p>We sent a 6-digit code to {{ session['user'] }}. Enter it below.</p>

{% if error %}
  <p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">
  <input type="text" name="code" placeholder="Enter 6-digit code" maxlength="6" required>
  <button type="submit">Verify</button>
</form>

{% endblock %}
