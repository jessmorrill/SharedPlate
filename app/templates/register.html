{% extends "base.html" %}

{% block content %}

<h2> Register </h2>

{% if error %}
<p style="color: red;">{{ error }}</p>
{% endif %}

<form method="POST">
    <p>Email: </p>
    <input type="text" name="email" required></p>

    <p> Username: </p>
    <input type="text" name="username" required></p>

    <p>Password:<br>
    <input type="password" name="password" required></p>

    <button type="submit">Register</button>
</form>

<p>Coming back? <a href="{{ url_for('login') }}">Log in</a></p>

{% if request.args.get('email') %}
<p style="margin-top:20px; color:green;">
    Account created! Click below to verify:
</p>

<a href="/verify/{{ request.args.get('email') }}">
    Verify Account
</a>
{% endif %}
{% endblock %}
